server {
    listen 80;
    server_name PHPMYADMIN_DOMAIN_PLACEHOLDER;
    root /usr/share/phpmyadmin;
    index index.php;
    proxy_connect_timeout 7200s;
    proxy_send_timeout 7200s;
    proxy_read_timeout 7200s;
    fastcgi_send_timeout 7200s;
    fastcgi_read_timeout 7200s;

    # Fichiers statiques (CSS/JS/Images) - servis directement par nginx
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers PHP - passés à PHP-FPM
    location ~* \.php$ {
        fastcgi_pass unix:/run/php/phpPHP_VERSION_PLACEHOLDER-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Tout le reste
    location / {
        try_files $uri $uri/ /index.php;
    }
}
