server {
    listen 80;
    server_name PROFILING_DOMAIN_PLACEHOLDER;
    root /usr/share/xhgui/webroot;
    index index.php;

    # Static files (CSS/JS/Images) - served directly by nginx
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PHP files - passed to PHP-FPM
    location ~* \.php$ {
        fastcgi_pass unix:/run/php/phpPHP_VERSION_PLACEHOLDER-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}
